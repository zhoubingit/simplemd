<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simplemd 启动中</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Segoe UI",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        color: #222833;
        background:
          radial-gradient(circle at 22% 18%, rgb(59 130 246 / 18%), transparent 34%),
          radial-gradient(circle at 78% 74%, rgb(34 197 94 / 16%), transparent 34%),
          linear-gradient(145deg, #fbfcff 0%, #eef2f7 100%);
      }

      body {
        display: grid;
        place-items: center;
        user-select: none;
      }

      .splash {
        width: 100%;
        height: 100%;
        padding: 30px 34px;
        display: grid;
        align-content: center;
        gap: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .mark {
        position: relative;
        width: 44px;
        height: 44px;
        border-radius: 15px;
        background:
          linear-gradient(135deg, #2563eb 0%, #22c55e 100%);
        box-shadow:
          0 18px 42px rgb(37 99 235 / 24%),
          inset 0 1px 0 rgb(255 255 255 / 34%);
      }

      .mark::after {
        content: "";
        position: absolute;
        inset: 12px;
        border: 2px solid rgb(255 255 255 / 78%);
        border-left-color: transparent;
        border-radius: 999px;
        animation: rotate 1.1s linear infinite;
      }

      .copy {
        display: grid;
        gap: 5px;
      }

      .name {
        margin: 0;
        font-size: 20px;
        line-height: 1.15;
        font-weight: 750;
        letter-spacing: -0.02em;
      }

      .status {
        margin: 0;
        color: #6b7280;
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      .progress-shell {
        display: grid;
        gap: 10px;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        color: #7b8491;
        font-size: 12px;
      }

      .progress {
        position: relative;
        height: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: rgb(148 163 184 / 30%);
      }

      .progress::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 45%;
        border-radius: inherit;
        background:
          linear-gradient(90deg, #2563eb 0%, #14b8a6 52%, #22c55e 100%);
        box-shadow: 0 0 18px rgb(37 99 235 / 35%);
        animation: loading 1.25s ease-in-out infinite;
      }

      @keyframes loading {
        0% {
          transform: translateX(-105%);
        }

        52% {
          transform: translateX(90%);
        }

        100% {
          transform: translateX(245%);
        }
      }

      @keyframes rotate {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          color: #f7f9fc;
          background:
            radial-gradient(circle at 22% 18%, rgb(59 130 246 / 22%), transparent 34%),
            radial-gradient(circle at 78% 74%, rgb(34 197 94 / 18%), transparent 34%),
            linear-gradient(145deg, #20242d 0%, #12151b 100%);
        }

        .status,
        .progress-label {
          color: #a4acb9;
        }

        .progress {
          background: rgb(148 163 184 / 18%);
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-label="应用启动中">
      <section class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div class="copy">
          <h1 class="name">simplemd</h1>
          <p class="status">正在启动 Markdown 编辑器</p>
        </div>
      </section>
      <section class="progress-shell" aria-hidden="true">
        <div class="progress-label">
          <span>Loading workspace</span>
          <span>请稍候</span>
        </div>
        <div class="progress"></div>
      </section>
    </main>
  </body>
</html>
